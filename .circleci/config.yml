version: 2.1

executors:
  python:
    docker:
      - image: python:3.11-slim

orbs:
  aws-ecr: circleci/aws-ecr@9.0.2
  aws-cli: circleci/aws-cli@4.1.3
  docker: circleci/docker@2.8.2

jobs:
  test:
    executor: python
    working_directory: ~/alterdeck
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            pip install -r requirements.txt
      - run:
          name: Run tests
          command: |
            pytest -v

  build_and_push:
    executor: aws-ecr/default
    parameters:
      tag:
        type: string
        default: latest
      platform:
        type: string
        default: linux/amd64
      push:
        type: boolean
        default: false
    working_directory: ~/alterdeck
    steps:
      - aws-ecr/build_and_push_image:
          account_id: ${AWS_ACCOUNT_ID}
          push_image: << parameters.push >>
          repo: hermes
          tag: << parameters.tag >>
          platform: << parameters.platform >>
          region: ${AWS_REGION}
          dockerfile: Dockerfile
          auth:
            - docker/check:
                docker-username: DOCKERHUB_USERNAME
                docker-password: DOCKERHUB_ACCESS_TOKEN
            - aws-cli/setup:
                region: ${AWS_REGION}

workflows:
  # Test on non-main branches
  test_only:
    when:
      not:
        equal:
          - main
          - << pipeline.git.branch >>
    jobs:
      - test:
          context:
            - dockerhub

  # Test, build and deploy on main branch
  test_build_deploy:
    when:
      equal:
        - main
        - << pipeline.git.branch >>
    jobs:
      - test:
          context:
            - dockerhub
      - build_and_push:
          push: true
          tag: latest,$CIRCLE_SHA1
          platform: linux/amd64
          requires:
            - test
          context:
            - ops
            - dockerhub
