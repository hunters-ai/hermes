# Rundeck configuration - uses new nested format
rundeck:
  base_url: "http://rundeck.internal.hntrsops.com"
  api_version: 52
  timeout: 120
  verify_ssl: true
  # Session-based auth (no expiration!)
  username: "${RUNDECK_USERNAME}"
  password: "${RUNDECK_PASSWORD}"

remediation:
  poll_interval_seconds: 30
  alertmanager_check_delay_minutes: 5
  max_job_wait_minutes: 30
  # P1: Cooldown between remediation attempts for same alert
  job_retrigger_cooldown_minutes: 5
  # P2: Concurrent workflow limits
  max_concurrent_workflows: 100
  # P0: Circuit breaker settings
  circuit_breaker_failure_threshold: 5
  circuit_breaker_recovery_seconds: 60
  # P3: Rate limiting settings
  rate_limit_enabled: true
  rate_limit_per_source_rate: 10.0  # requests/sec per Alertmanager
  rate_limit_per_source_burst: 50
  rate_limit_global_rate: 100.0     # total requests/sec
  rate_limit_global_burst: 500

state_store:
  type: "dynamodb"
  dynamodb_table: "hunters-ops-hermes-workflows"
  dynamodb_region: "us-west-2"
  ttl_hours: 24
jira:
  base_url: "https://api.atlassian.com/ex/jira/0e1a6846-648a-4adf-b321-514ce8001d56"
  api_token: "${JIRA_API_TOKEN}"
  user_email: "jiraalertbot-923reuug8w@serviceaccount.atlassian.com"

alerts:
  'Node is in NotReady state for 30 minutes':
    fields_location: commonLabels
    job_id: 4c3d646b-013e-40cf-82a8-24cae685f182
    remediation:
      enabled: true
      alertmanager_check_delay_minutes: 5
    required_fields:
      - node
      - cluster
      - region
    field_mappings:
      node: node_name
      region: region
    # Example: Conditionally set cluster option based on region value
    value_mappings:
      region:
        us-west-2:
          cluster_name: us-west-2-prod-new
        eu-west-1:
          cluster_name: eu-west-1-prod
        ap-south-1:
          cluster_name: ap-south-1-prod

  # FN Dataflow Internal Issues - requires customer action, so skip resolution check
  # Routes to different Rundeck jobs based on error_message field value
  'FN Dataflow Internal Issues':
    fields_location: commonLabels
    job_id: 6f037e9c-8342-49d3-b035-105b6e9abf77  # Default fallback job
    job_id_mappings:
      error_message:
        "Data-collection-vendor-is-down": "07262d42-6883-40be-8af2-69a19ed0744d"
        "Data-collection-got-rate-limit-error": "07262d42-6883-40be-8af2-69a19ed0744d"
        "Active-dataflow-is-not-running-or-failed": "c215a485-b533-4441-a722-1073be2a7cb8"
    remediation:
      enabled: true
      jira_ticket_option: jira_ticket
      fetch_jira_ticket: true
      jira_summary_search_field: dataflow_id
      skip_resolution_check: true  # Alert won't auto-resolve, requires customer action
      job_retrigger_cooldown_minutes: 30  # Longer cooldown - don't spam Rundeck for customer-dependent alerts
    required_fields:
      - dataflow_id
      - cluster
      - error_message  # Added to ensure error_message is extracted from alert
    field_mappings:
      cluster: cluster_name

slack:
  enabled: true
  noc_channel: "#alerts-sandbox" # Changed from nocChannel
  noc_user_group: "noc-on-call"
  webhook_url: "${SLACK_WEBHOOK_URL}"
